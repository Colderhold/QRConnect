{% extends "home_layout.html" %}

{% block title %}
    Change Password
{% endblock %}

{% block body %}
    <h2 style="text-align: center;">Change Password</h2>
    <form action="{{ url_for('change_password') }}" method="post">
        <div class="form-group">
            <label for="new_password">Old Password</label>
            <input type="password" name="old_password" class="form-control" id="old_password" required>
            <label for="new_password">New Password</label>
            <input type="password" name="new_password" class="form-control" id="new_password" required>
        </div>
        <!-- Add other password fields and form elements as needed -->

        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
{% endblock %}

{% block right_button %}
    <button type="button" class="btn btn-outline-success" onclick="window.location.href='{{ url_for('editProfile') }}';">Back to Profile</button>
{% endblock %}
